<!DOCTYPE html>
<html>
  <head>
    <title>Position Practise</title>
  </head>
  <body style="height: 3000px;padding-top: 60px;padding-left: 80px;">
    <div style="top: 0;left:0;position: relative;background-color: lightblue;width: 150px;height: 150px;">
      div2
      </div>
    </div>
    <div style="
      background-color: black;
      color: white;
      position:fixed;
      top:0px;
      left: 0px;
      right: 0px;
      height: 50px;
      ">header</div>
    <div style="
      background-color: green;
      position: fixed;
      bottom: 0;
      top: 50px;
      left: 0;
      width: 80px;
      ">
      sidebar
      <div style="
      background-color: red;
      color: white;
      position: absolute;
      top: 0px;
      right: 0;
      ">x</div>
    </div>
    <div style="
      background-color: red;
      color: white;
      position: absolute;
      top: 60px;
      right: 50px;
      z-index: 0;">absolute</div>
    <div style="background-color: lightblue;width: 150px;height: 150px;position: relative;">div1</div>
    <div style="position: relative;background-color: lightpink;width: 150px;height: 150px;">
      div2
      <div style="
      background-color: red;
      color: white;
      position: absolute;
      bottom: 10px;
      right: 10px;">absolute</div>
    </div>
    <div style="position: relative;background-color: lightpink;width: 150px;height: 150px;">
      div2
      
  </body>
</html>
